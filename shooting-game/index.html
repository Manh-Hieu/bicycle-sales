<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Bắn Bia - Có Level</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="menu-screen" id="menuScreen">
    <div class="menu-content">
      <h1>🎯 GAME BẮN BIA 🎯</h1>
      <p>Chọn độ khó để bắt đầu</p>

      <div class="level-buttons">
        <button class="level-btn level-1" onclick="startGame(1)">
          ⭐ DỄ
          <div class="level-info">30s | Bia lớn</div>
        </button>
        <button class="level-btn level-2" onclick="startGame(2)">
          ⭐⭐ BÌNH THƯỜNG
          <div class="level-info">25s | Bia trung bình</div>
        </button>
        <button class="level-btn level-3" onclick="startGame(3)">
          ⭐⭐⭐ KHÓ
          <div class="level-info">20s | Bia nhỏ</div>
        </button>
        <button class="level-btn level-4" onclick="startGame(4)">
          ⭐⭐⭐⭐ SIÊU KHÓ
          <div class="level-info">15s | Bia cực nhỏ</div>
        </button>
      </div>
    </div>
  </div>

  <div class="game-container" id="gameContainer">
    <div class="ui">
      <div class="ui-item level-display">📍 Level: <span id="levelDisplay">1</span></div>
      <div class="ui-item score">💯 Điểm: <span id="score">0</span></div>
      <div class="ui-item time">⏱️ Thời gian: <span id="timer">30</span>s</div>
      <div class="ui-item ammo">🔫 Lần bắn: <span id="shots">5</span></div>
    </div>

    <div class="game-over" id="gameOver">
      <h2 id="gameOverTitle">GAME OVER!</h2>
      <p>Điểm của bạn: <span id="finalScore">0</span></p>
      <p id="message"></p>
      <button onclick="backToMenu()">Quay Lại Menu</button>
      <button onclick="location.reload()">Chơi Lại</button>
    </div>

    <div class="instructions">
      👆 Click để bắn bia<br>
      ⏰ Đua với thời gian
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
